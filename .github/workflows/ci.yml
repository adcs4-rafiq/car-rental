name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test .NET Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore backend-dotnet/src/CarRentalApi/CarRentalApi.csproj
      - name: Build
        run: dotnet build backend-dotnet/src/CarRentalApi/CarRentalApi.csproj --no-restore
      - name: Test
        run: dotnet test backend-dotnet/tests/ApiTests.csproj --verbosity normal

  test-worker:
    name: Test Python Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r worker-python/requirements.txt pytest ruff
      - name: Lint
        run: ruff check worker-python/src/
      - name: Test
        run: pytest worker-python/tests/ -v

  test-frontend:
    name: Test React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-js/package-lock.json
      - name: Install
        working-directory: frontend-js
        run: npm install
      - name: Lint
        working-directory: frontend-js
        run: npm run lint
      - name: Test
        working-directory: frontend-js
        run: npm run test

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-worker, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-dotnet
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/carrental-backend:latest
      - name: Push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker-python
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/carrental-worker:latest
      - name: Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-js
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/carrental-frontend:latest
      - name: Trigger Jenkins
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/carrental-deploy/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
